<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Damaged | Warehouse</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url("ad/images/TeamWarehouse.png") no-repeat center center fixed;
      background-size: cover;
      background-color: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    /* Make entire page clickable */
    a.full-link {
      display: block;
      width: 100%;
      min-height: 100vh;
      text-decoration: none;
      color: inherit;
    }

    /* Optional overlay content (you can remove if you want pure image) */
    .content {
      position: relative;
      z-index: 2;
      padding: 40px;
      text-align: center;
      background: rgba(0, 0, 0, 0.4); /* subtle readability layer */
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <!-- 🔗 THIS IS THE KEY: href wraps EVERYTHING -->
  <a href="https://beautifullydamaged.netlify.app/" class="full-link">

    <div class="content">
      <h1>Damaged Warehouse</h1>
      <!-- You can remove this text if you want just the image -->
    </div>

  </a>

</body>
</html>
